apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketshop-db
  namespace: ticketshop
  labels:
    app: ticketshop
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketshop
      tier: database
  template:
    metadata:
      labels:
        app: ticketshop
        tier: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketshop-db-secret
                  key: db-root-password
            - name: MYSQL_DATABASE
              value: "tickets"
            - name: MYSQL_USER
              value: "ticketuser"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketshop-db-secret
                  key: db-password
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: ticketshop-db-pvc
        - name: init-script
          configMap:
            name: ticketshop-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: ticketshop-db
  namespace: ticketshop
spec:
  selector:
    app: ticketshop
    tier: database
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306